name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  build:
    name: Build (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all modules
        run: ./gradlew --no-daemon -Dorg.gradle.vfs.watch=false -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8" clean build

      - name: Publish GitHub release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              build/libs/*.jar \
              asyncvault-api/build/libs/*.jar \
              --clobber
          else
            gh release create "$TAG" \
              build/libs/*.jar \
              asyncvault-api/build/libs/*.jar \
              --title "$TAG" \
              --notes "Automated release for $TAG" \
              --verify-tag
          fi

      - name: JitPack info (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "JitPack builds automatically from tags."
          echo "URL: https://jitpack.io/com/github/AshleyThew/AsyncVault/${{ github.ref_name }}"
